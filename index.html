<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pressione &amp; Battiti — Diario</title>
<style>
  :root{
    --fondo: #0f1720;
    --pannello: #161f2b;
    --pannello-alto: #1c2734;
    --bordo: #263242;
    --testo: #eef2f6;
    --testo-attenuato: #7c8a9c;
    --accento: #5ee6b8;
    --accento-scuro: #16332a;
    --ambra: #f2b559;
    --ambra-scuro: #382c14;
    --rosso: #ff7a6b;
    --rosso-scuro: #3a1917;
    --font-display: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
    --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background:
      radial-gradient(circle at 15% -10%, rgba(94,230,184,0.10), transparent 45%),
      radial-gradient(circle at 100% 0%, rgba(94,138,230,0.08), transparent 40%),
      var(--fondo);
    color: var(--testo);
    font-family: var(--font-display);
    font-size: 16px;
    line-height: 1.5;
    padding: 0 0 4rem;
    min-height: 100vh;
  }

  .foglio {
    max-width: 640px;
    margin: 0 auto;
    padding: 2.8rem 1.5rem 0;
  }

  header.testata {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }
  header.testata h1 {
    font-size: 1.3rem;
    margin: 0;
    letter-spacing: -0.01em;
    font-weight: 700;
  }
  header.testata .data-oggi {
    font-size: 0.8rem;
    color: var(--testo-attenuato);
    text-transform: capitalize;
  }

  section.modulo {
    background: linear-gradient(160deg, var(--pannello-alto), var(--pannello));
    border: 1px solid var(--bordo);
    border-radius: 20px;
    padding: 1.7rem;
    margin-bottom: 2.2rem;
    box-shadow: 0 20px 40px -24px rgba(0,0,0,0.5);
  }

  .campi {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.9rem;
    margin-bottom: 1.3rem;
  }
  .campo {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--bordo);
    border-radius: 14px;
    padding: 0.7rem 0.6rem;
    transition: border-color 0.15s, background 0.15s;
  }
  .campo:focus-within {
    border-color: var(--accento);
    background: rgba(94,230,184,0.05);
  }
  .campo label {
    display: block;
    font-size: 0.66rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--testo-attenuato);
    margin-bottom: 0.3rem;
  }
  .campo input {
    width: 100%;
    font-family: var(--font-mono);
    font-size: 1.35rem;
    font-weight: 600;
    padding: 0;
    border: none;
    background: transparent;
    color: var(--testo);
  }
  .campo input:focus { outline: none; }
  .campo input::placeholder { color: #3d4a5a; }
  .campo span.unita {
    font-size: 0.64rem;
    color: var(--testo-attenuato);
  }

  .riga-azioni {
    display: flex;
    gap: 0.7rem;
    align-items: center;
    flex-wrap: wrap;
  }

  button.principale {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.92rem;
    background: var(--accento);
    color: #08251c;
    border: none;
    padding: 0.75rem 1.4rem;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
    box-shadow: 0 8px 20px -8px rgba(94,230,184,0.5);
  }
  button.principale:hover { transform: translateY(-1px); }
  button.principale:active { transform: translateY(0); }

  #esito-form {
    font-size: 0.8rem;
    color: var(--rosso);
    min-height: 1.2em;
  }

  /* --- Voci diario --- */
  h2.sezione-titolo {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--testo-attenuato);
    margin: 0 0 0.9rem;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  h2.sezione-titolo .conteggio {
    font-family: var(--font-mono);
    background: var(--pannello-alto);
    padding: 0.1rem 0.5rem;
    border-radius: 999px;
    border: 1px solid var(--bordo);
  }

  .voce {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.1rem;
    background: var(--pannello);
    border: 1px solid var(--bordo);
    border-radius: 16px;
    margin-bottom: 0.7rem;
  }

  .voce .quando {
    font-size: 0.72rem;
    color: var(--testo-attenuato);
    white-space: nowrap;
  }

  .voce .valori {
    font-family: var(--font-mono);
    font-size: 1.1rem;
    font-weight: 600;
    display: flex;
    gap: 1.2rem;
  }
  .voce .valori .v small {
    display: block;
    font-size: 0.58rem;
    font-weight: 400;
    color: var(--testo-attenuato);
    text-transform: uppercase;
    font-family: var(--font-display);
  }

  .etichetta {
    font-size: 0.66rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    padding: 0.3rem 0.65rem;
    border-radius: 999px;
    white-space: nowrap;
  }
  .etichetta.normale { background: var(--accento-scuro); color: var(--accento); }
  .etichetta.attenzione { background: var(--ambra-scuro); color: var(--ambra); }
  .etichetta.critico { background: var(--rosso-scuro); color: var(--rosso); }

  .voce button.elimina {
    background: none;
    border: none;
    color: #4a5768;
    font-size: 1.1rem;
    cursor: pointer;
    line-height: 1;
    padding: 0.2rem 0.4rem;
    border-radius: 8px;
    transition: color 0.15s, background 0.15s;
  }
  .voce button.elimina:hover { color: var(--rosso); background: var(--rosso-scuro); }

  .vuoto {
    text-align: center;
    color: var(--testo-attenuato);
    font-size: 0.9rem;
    padding: 2.8rem 1rem;
    background: var(--pannello);
    border: 1px dashed var(--bordo);
    border-radius: 16px;
  }

  footer.piede {
    text-align: center;
    font-size: 0.72rem;
    color: var(--testo-attenuato);
    opacity: 0.6;
    margin-top: 2.5rem;
  }

  @media (max-width: 560px) {
    .campi { grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; }
    .campo { padding: 0.55rem 0.45rem; }
    .campo input { font-size: 1.05rem; }
    .voce { grid-template-columns: 1fr; row-gap: 0.6rem; }
    .voce .quando { order: -1; }
  }
</style>
</head>
<body>

<div class="foglio">
  <header class="testata">
    <h1>Pressione &amp; Battiti</h1>
    <span class="data-oggi" id="data-oggi"></span>
  </header>

  <section class="modulo">
    <div class="campi">
      <div class="campo">
        <label for="sistolica">Sistolica <span class="unita">mmHg</span></label>
        <input type="number" id="sistolica" placeholder="120" inputmode="numeric">
      </div>
      <div class="campo">
        <label for="diastolica">Diastolica <span class="unita">mmHg</span></label>
        <input type="number" id="diastolica" placeholder="80" inputmode="numeric">
      </div>
      <div class="campo">
        <label for="battiti">Battiti <span class="unita">bpm</span></label>
        <input type="number" id="battiti" placeholder="70" inputmode="numeric">
      </div>
    </div>
    <div class="riga-azioni">
      <button class="principale" id="btn-salva">Registra misurazione</button>
      <span id="esito-form"></span>
    </div>
  </section>

  <h2 class="sezione-titolo">Diario misurazioni <span class="conteggio" id="conteggio">0</span></h2>
  <div id="lista-voci"></div>

  <footer class="piede">I dati restano salvati solo in questo browser.</footer>
</div>

<script>
(function(){
  const CHIAVE = 'diario_pressione_v1';

  function carica(){
    try { return JSON.parse(localStorage.getItem(CHIAVE)) || []; }
    catch(e){ return []; }
  }
  function salva(voci){ localStorage.setItem(CHIAVE, JSON.stringify(voci)); }

  function valutaPressione(sis, dia){
    if (sis < 90 || dia < 60) return {testo:'Bassa', classe:'attenzione'};
    if (sis >= 140 || dia >= 90) return {testo:'Alta', classe:'critico'};
    if (sis >= 130 || dia >= 85) return {testo:'Normale-alta', classe:'attenzione'};
    return {testo:'Normale', classe:'normale'};
  }

  function valutaBattiti(bpm){
    if (bpm < 60) return {testo:'Bassi', classe:'attenzione'};
    if (bpm > 100) return {testo:'Alti', classe:'critico'};
    return {testo:'Normali', classe:'normale'};
  }

  function formattaData(iso){
    const d = new Date(iso);
    const oggi = new Date();
    const giorni = ['dom','lun','mar','mer','gio','ven','sab'];
    const stessGiorno = d.toDateString() === oggi.toDateString();
    const ora = d.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
    if (stessGiorno) return 'Oggi, ' + ora;
    return giorni[d.getDay()] + ' ' + d.getDate() + '/' + (d.getMonth()+1) + ', ' + ora;
  }

  function disegna(){
    const voci = carica();
    const lista = document.getElementById('lista-voci');
    document.getElementById('conteggio').textContent = voci.length;

    if (voci.length === 0){
      lista.innerHTML = '<div class="vuoto">Nessuna misurazione ancora registrata.</div>';
      return;
    }

    const ordinate = [...voci].sort((a,b) => new Date(b.quando) - new Date(a.quando));

    lista.innerHTML = ordinate.map(v => {
      const p = valutaPressione(v.sistolica, v.diastolica);
      const b = valutaBattiti(v.battiti);
      return `
        <div class="voce" data-id="${v.id}">
          <span class="quando">${formattaData(v.quando)}</span>
          <span class="valori">
            <span class="v">${v.sistolica}/${v.diastolica}<small>mmHg</small></span>
            <span class="v">${v.battiti}<small>bpm</small></span>
          </span>
          <span class="etichetta ${p.classe}">${p.testo}</span>
          <button class="elimina" title="Elimina" data-id="${v.id}">✕</button>
        </div>
      `;
    }).join('');

    lista.querySelectorAll('button.elimina').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-id');
        const rimaste = carica().filter(v => String(v.id) !== id);
        salva(rimaste);
        disegna();
      });
    });
  }

  function registra(){
    const sisEl = document.getElementById('sistolica');
    const diaEl = document.getElementById('diastolica');
    const bpmEl = document.getElementById('battiti');
    const esito = document.getElementById('esito-form');

    const sis = parseInt(sisEl.value, 10);
    const dia = parseInt(diaEl.value, 10);
    const bpm = parseInt(bpmEl.value, 10);

    if (!sis || !dia || !bpm){
      esito.textContent = 'Compila tutti e tre i valori.';
      return;
    }
    if (sis < 40 || sis > 300 || dia < 20 || dia > 200 || bpm < 20 || bpm > 250){
      esito.textContent = 'Controlla i valori inseriti, sembrano fuori scala.';
      return;
    }

    const voci = carica();
    voci.push({ id: Date.now(), quando: new Date().toISOString(), sistolica: sis, diastolica: dia, battiti: bpm });
    salva(voci);

    esito.textContent = '';
    sisEl.value = ''; diaEl.value = ''; bpmEl.value = '';
    sisEl.focus();
    disegna();
  }

  document.getElementById('btn-salva').addEventListener('click', registra);
  [document.getElementById('sistolica'), document.getElementById('diastolica'), document.getElementById('battiti')].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') registra(); });
  });

  document.getElementById('data-oggi').textContent = new Date().toLocaleDateString('it-IT', {weekday:'long', day:'numeric', month:'long'});

  disegna();
})();
</script>

</body>
</html>

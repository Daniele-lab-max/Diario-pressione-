<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pressione &amp; Battiti — Diario</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --fondo: #0f1720;
    --pannello: #161f2b;
    --pannello-alto: #1c2734;
    --bordo: #263242;
    --testo: #eef2f6;
    --testo-attenuato: #7c8a9c;
    --accento: #5ee6b8;
    --accento-scuro: #16332a;
    --ambra: #f2b559;
    --ambra-scuro: #382c14;
    --rosso: #ff7a6b;
    --rosso-scuro: #3a1917;
    --font-display: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
    --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background:
      radial-gradient(circle at 15% -10%, rgba(94,230,184,0.10), transparent 45%),
      radial-gradient(circle at 100% 0%, rgba(94,138,230,0.08), transparent 40%),
      var(--fondo);
    color: var(--testo);
    font-family: var(--font-display);
    font-size: 16px;
    line-height: 1.5;
    padding: 0 0 4rem;
    min-height: 100vh;
  }

  .foglio {
    max-width: 640px;
    margin: 0 auto;
    padding: 2.8rem 1.5rem 0;
  }

  header.testata {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }
  header.testata h1 {
    font-size: 1.3rem;
    margin: 0;
    letter-spacing: -0.01em;
    font-weight: 700;
  }
  header.testata .data-oggi {
    font-size: 0.8rem;
    color: var(--testo-attenuato);
    text-transform: capitalize;
  }

  section.modulo {
    background: linear-gradient(160deg, var(--pannello-alto), var(--pannello));
    border: 1px solid var(--bordo);
    border-radius: 20px;
    padding: 1.7rem;
    margin-bottom: 2.2rem;
    box-shadow: 0 20px 40px -24px rgba(0,0,0,0.5);
  }

  .campi {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.9rem;
    margin-bottom: 1.3rem;
  }
  .campo {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--bordo);
    border-radius: 14px;
    padding: 0.7rem 0.6rem;
    transition: border-color 0.15s, background 0.15s;
  }
  .campo:focus-within {
    border-color: var(--accento);
    background: rgba(94,230,184,0.05);
  }
  .campo-quando {
    margin-bottom: 0.9rem;
  }
  .campo-quando input[type="datetime-local"] {
    font-family: var(--font-mono);
    font-size: 0.95rem;
    color-scheme: dark;
  }
  .campo label {
    display: block;
    font-size: 0.66rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--testo-attenuato);
    margin-bottom: 0.3rem;
  }
  .campo input {
    width: 100%;
    font-family: var(--font-mono);
    font-size: 1.35rem;
    font-weight: 600;
    padding: 0;
    border: none;
    background: transparent;
    color: var(--testo);
  }
  .campo input:focus { outline: none; }
  .campo input::placeholder { color: #3d4a5a; }
  .campo span.unita {
    font-size: 0.64rem;
    color: var(--testo-attenuato);
  }

  .riga-azioni {
    display: flex;
    gap: 0.7rem;
    align-items: center;
    flex-wrap: wrap;
  }

  button.principale {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.92rem;
    background: var(--accento);
    color: #08251c;
    border: none;
    padding: 0.75rem 1.4rem;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
    box-shadow: 0 8px 20px -8px rgba(94,230,184,0.5);
  }
  button.principale:hover { transform: translateY(-1px); }
  button.principale:active { transform: translateY(0); }

  #esito-form {
    font-size: 0.8rem;
    color: var(--rosso);
    min-height: 1.2em;
  }

  /* --- Voci diario --- */
  h2.sezione-titolo {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--testo-attenuato);
    margin: 0 0 0.9rem;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  h2.sezione-titolo .conteggio {
    font-family: var(--font-mono);
    background: var(--pannello-alto);
    padding: 0.1rem 0.5rem;
    border-radius: 999px;
    border: 1px solid var(--bordo);
  }

  .voce {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.1rem;
    background: var(--pannello);
    border: 1px solid var(--bordo);
    border-radius: 16px;
    margin-bottom: 0.7rem;
  }

  .voce .quando {
    font-size: 0.72rem;
    color: var(--testo-attenuato);
    white-space: nowrap;
  }

  .voce .valori {
    font-family: var(--font-mono);
    font-size: 1.1rem;
    font-weight: 600;
    display: flex;
    gap: 1.2rem;
  }
  .voce .valori .v small {
    display: block;
    font-size: 0.58rem;
    font-weight: 400;
    color: var(--testo-attenuato);
    text-transform: uppercase;
    font-family: var(--font-display);
  }

  .etichetta {
    font-size: 0.66rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    padding: 0.3rem 0.65rem;
    border-radius: 999px;
    white-space: nowrap;
  }
  .etichetta.normale { background: var(--accento-scuro); color: var(--accento); }
  .etichetta.attenzione { background: var(--ambra-scuro); color: var(--ambra); }
  .etichetta.critico { background: var(--rosso-scuro); color: var(--rosso); }

  .voce button.elimina {
    background: none;
    border: none;
    color: #4a5768;
    font-size: 1.1rem;
    cursor: pointer;
    line-height: 1;
    padding: 0.2rem 0.4rem;
    border-radius: 8px;
    transition: color 0.15s, background 0.15s;
  }
  .voce button.elimina:hover { color: var(--rosso); background: var(--rosso-scuro); }

  .vuoto {
    text-align: center;
    color: var(--testo-attenuato);
    font-size: 0.9rem;
    padding: 2.8rem 1rem;
    background: var(--pannello);
    border: 1px dashed var(--bordo);
    border-radius: 16px;
  }

  footer.piede {
    text-align: center;
    font-size: 0.72rem;
    color: var(--testo-attenuato);
    opacity: 0.6;
    margin-top: 2.5rem;
  }

  @media (max-width: 560px) {
    .campi { grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; }
    .campo { padding: 0.55rem 0.45rem; }
    .campo input { font-size: 1.05rem; }
    .voce { grid-template-columns: 1fr; row-gap: 0.6rem; }
    .voce .quando { order: -1; }
  }

  /* --- Login --- */
  .schermo-login {
    max-width: 380px;
    margin: 4.5rem auto 0;
    padding: 0 1.5rem;
  }
  .scheda-login {
    background: linear-gradient(160deg, var(--pannello-alto), var(--pannello));
    border: 1px solid var(--bordo);
    border-radius: 20px;
    padding: 1.8rem;
    box-shadow: 0 20px 40px -24px rgba(0,0,0,0.5);
  }
  .scheda-login h1 {
    font-size: 1.2rem;
    margin: 0 0 0.3rem;
  }
  .scheda-login p.sottotitolo {
    font-size: 0.82rem;
    color: var(--testo-attenuato);
    margin: 0 0 1.4rem;
  }
  .campo-login {
    margin-bottom: 0.9rem;
  }
  .campo-login label {
    display: block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--testo-attenuato);
    margin-bottom: 0.35rem;
  }
  .campo-login input {
    width: 100%;
    font-family: var(--font-display);
    font-size: 0.95rem;
    padding: 0.65rem 0.75rem;
    border-radius: 10px;
    border: 1px solid var(--bordo);
    background: rgba(255,255,255,0.03);
    color: var(--testo);
  }
  .campo-login input:focus {
    outline: none;
    border-color: var(--accento);
  }
  .riga-login-azioni {
    display: flex;
    gap: 0.7rem;
    align-items: center;
    margin-top: 1.2rem;
    flex-wrap: wrap;
  }
  button.secondario {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.85rem;
    background: transparent;
    color: var(--testo-attenuato);
    border: 1px solid var(--bordo);
    padding: 0.7rem 1.1rem;
    border-radius: 12px;
    cursor: pointer;
  }
  button.secondario:hover { color: var(--testo); border-color: var(--testo-attenuato); }
  #esito-login {
    font-size: 0.8rem;
    color: var(--rosso);
    margin-top: 0.9rem;
    min-height: 1.2em;
  }
  .barra-utente {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--testo-attenuato);
    margin-bottom: 1.4rem;
    padding: 0.6rem 0.9rem;
    background: var(--pannello);
    border: 1px solid var(--bordo);
    border-radius: 12px;
  }
  .barra-utente button {
    font-family: var(--font-display);
    font-size: 0.75rem;
    font-weight: 600;
    background: none;
    border: none;
    color: var(--rosso);
    cursor: pointer;
    padding: 0.2rem 0.4rem;
  }
  .nascosto { display: none !important; }
</style>
</head>
<body>

<div class="schermo-login nascosto" id="schermo-login">
  <div class="scheda-login">
    <h1>Pressione &amp; Battiti</h1>
    <p class="sottotitolo">Accedi per sincronizzare i tuoi dati su tutti i dispositivi.</p>

    <div class="campo-login">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="tuo@esempio.it" autocomplete="email">
    </div>
    <div class="campo-login">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div class="riga-login-azioni">
      <button class="principale" id="btn-accedi">Accedi</button>
      <button class="secondario" id="btn-registrati">Crea account</button>
    </div>
    <div id="esito-login"></div>
  </div>
</div>

<div class="foglio nascosto" id="app-principale">
  <header class="testata">
    <h1>Pressione &amp; Battiti</h1>
    <span class="data-oggi" id="data-oggi"></span>
  </header>

  <div class="barra-utente">
    <span id="email-utente"></span>
    <button id="btn-esci">Esci</button>
  </div>

  <section class="modulo">
    <div class="campo campo-quando">
      <label for="quando-misurazione">Data e ora</label>
      <input type="datetime-local" id="quando-misurazione">
    </div>
    <div class="campi">
      <div class="campo">
        <label for="sistolica">Sistolica <span class="unita">mmHg</span></label>
        <input type="number" id="sistolica" placeholder="120" inputmode="numeric">
      </div>
      <div class="campo">
        <label for="diastolica">Diastolica <span class="unita">mmHg</span></label>
        <input type="number" id="diastolica" placeholder="80" inputmode="numeric">
      </div>
      <div class="campo">
        <label for="battiti">Battiti <span class="unita">bpm</span></label>
        <input type="number" id="battiti" placeholder="70" inputmode="numeric">
      </div>
    </div>
    <div class="riga-azioni">
      <button class="principale" id="btn-salva">Registra misurazione</button>
      <span id="esito-form"></span>
    </div>
  </section>

  <h2 class="sezione-titolo">Diario misurazioni <span class="conteggio" id="conteggio">0</span></h2>
  <div id="lista-voci"></div>

  <footer class="piede">I dati sono sincronizzati sul tuo account, su tutti i dispositivi.</footer>
</div>

<script>
(function(){
  // --- Configurazione Supabase ---
  const SUPABASE_URL = 'https://zkczoojbuxqkmxizrurx.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_-JYiyokA5eU8kbm5hZ2GUw_9r2uUpP8';

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let vociCache = [];

  async function carica(){
    const { data, error } = await sb
      .from('misurazioni')
      .select('*')
      .order('quando', { ascending: false });
    if (error){ console.error(error); return []; }
    return data.map(r => ({
      id: r.id,
      quando: r.quando,
      sistolica: r.sistolica,
      diastolica: r.diastolica,
      battiti: r.battiti
    }));
  }

  async function inserisci(voce){
    const { error } = await sb.from('misurazioni').insert({
      quando: voce.quando,
      sistolica: voce.sistolica,
      diastolica: voce.diastolica,
      battiti: voce.battiti
    });
    if (error) console.error(error);
    return !error;
  }

  async function elimina(id){
    const { error } = await sb.from('misurazioni').delete().eq('id', id);
    if (error) console.error(error);
    return !error;
  }

  function valutaPressione(sis, dia){
    if (sis < 90 || dia < 60) return {testo:'Bassa', classe:'attenzione'};
    if (sis >= 140 || dia >= 90) return {testo:'Alta', classe:'critico'};
    if (sis >= 130 || dia >= 85) return {testo:'Normale-alta', classe:'attenzione'};
    return {testo:'Normale', classe:'normale'};
  }

  function valutaBattiti(bpm){
    if (bpm < 60) return {testo:'Bassi', classe:'attenzione'};
    if (bpm > 100) return {testo:'Alti', classe:'critico'};
    return {testo:'Normali', classe:'normale'};
  }

  function formattaData(iso){
    const d = new Date(iso);
    const oggi = new Date();
    const giorni = ['dom','lun','mar','mer','gio','ven','sab'];
    const stessGiorno = d.toDateString() === oggi.toDateString();
    const ora = d.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
    if (stessGiorno) return 'Oggi, ' + ora;
    return giorni[d.getDay()] + ' ' + d.getDate() + '/' + (d.getMonth()+1) + ', ' + ora;
  }

  async function disegna(){
    vociCache = await carica();
    const lista = document.getElementById('lista-voci');
    document.getElementById('conteggio').textContent = vociCache.length;

    if (vociCache.length === 0){
      lista.innerHTML = '<div class="vuoto">Nessuna misurazione ancora registrata.</div>';
      return;
    }

    const ordinate = vociCache;

    lista.innerHTML = ordinate.map(v => {
      const p = valutaPressione(v.sistolica, v.diastolica);
      const b = valutaBattiti(v.battiti);
      return `
        <div class="voce" data-id="${v.id}">
          <span class="quando">${formattaData(v.quando)}</span>
          <span class="valori">
            <span class="v">${v.sistolica}/${v.diastolica}<small>mmHg</small></span>
            <span class="v">${v.battiti}<small>bpm</small></span>
          </span>
          <span class="etichetta ${p.classe}">${p.testo}</span>
          <button class="elimina" title="Elimina" data-id="${v.id}">✕</button>
        </div>
      `;
    }).join('');

    lista.querySelectorAll('button.elimina').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.getAttribute('data-id');
        btn.disabled = true;
        await elimina(id);
        disegna();
      });
    });
  }

  async function registra(){
    const sisEl = document.getElementById('sistolica');
    const diaEl = document.getElementById('diastolica');
    const bpmEl = document.getElementById('battiti');
    const quandoEl = document.getElementById('quando-misurazione');
    const esito = document.getElementById('esito-form');

    const sis = parseInt(sisEl.value, 10);
    const dia = parseInt(diaEl.value, 10);
    const bpm = parseInt(bpmEl.value, 10);

    if (!sis || !dia || !bpm){
      esito.textContent = 'Compila tutti e tre i valori.';
      return;
    }
    if (sis < 40 || sis > 300 || dia < 20 || dia > 200 || bpm < 20 || bpm > 250){
      esito.textContent = 'Controlla i valori inseriti, sembrano fuori scala.';
      return;
    }
    if (!quandoEl.value){
      esito.textContent = 'Seleziona data e ora della misurazione.';
      return;
    }

    const quandoISO = new Date(quandoEl.value).toISOString();

    document.getElementById('btn-salva').disabled = true;
    const ok = await inserisci({ quando: quandoISO, sistolica: sis, diastolica: dia, battiti: bpm });
    document.getElementById('btn-salva').disabled = false;

    if (!ok){
      esito.textContent = 'Errore nel salvataggio, riprova.';
      return;
    }

    esito.textContent = '';
    sisEl.value = ''; diaEl.value = ''; bpmEl.value = '';
    impostaOraAttuale();
    sisEl.focus();
    disegna();
  }

  document.getElementById('btn-salva').addEventListener('click', registra);
  [document.getElementById('sistolica'), document.getElementById('diastolica'), document.getElementById('battiti')].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') registra(); });
  });

  function impostaOraAttuale(){
    const ora = new Date();
    ora.setMinutes(ora.getMinutes() - ora.getTimezoneOffset());
    document.getElementById('quando-misurazione').value = ora.toISOString().slice(0, 16);
  }
  impostaOraAttuale();

  document.getElementById('data-oggi').textContent = new Date().toLocaleDateString('it-IT', {weekday:'long', day:'numeric', month:'long'});

  // --- Autenticazione ---
  const schermoLogin = document.getElementById('schermo-login');
  const appPrincipale = document.getElementById('app-principale');
  const esitoLogin = document.getElementById('esito-login');

  function mostraApp(sessione){
    schermoLogin.classList.add('nascosto');
    appPrincipale.classList.remove('nascosto');
    document.getElementById('email-utente').textContent = sessione.user.email;
    disegna();
  }

  function mostraLogin(){
    appPrincipale.classList.add('nascosto');
    schermoLogin.classList.remove('nascosto');
  }

  async function accedi(){
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    esitoLogin.textContent = '';
    if (!email || !password){ esitoLogin.textContent = 'Inserisci email e password.'; return; }

    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) esitoLogin.textContent = 'Credenziali non valide.';
  }

  async function registrati(){
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    esitoLogin.textContent = '';
    if (!email || !password){ esitoLogin.textContent = 'Inserisci email e password.'; return; }
    if (password.length < 6){ esitoLogin.textContent = 'La password deve avere almeno 6 caratteri.'; return; }

    const { data, error } = await sb.auth.signUp({ email, password });
    if (error){ esitoLogin.textContent = 'Impossibile creare l\'account: ' + error.message; return; }
    if (data.session){
      // Login automatico se la conferma email è disattivata
    } else {
      esitoLogin.textContent = 'Controlla la tua email per confermare l\'account.';
    }
  }

  async function esci(){
    await sb.auth.signOut();
  }

  document.getElementById('btn-accedi').addEventListener('click', accedi);
  document.getElementById('btn-registrati').addEventListener('click', registrati);
  document.getElementById('btn-esci').addEventListener('click', esci);
  [document.getElementById('login-email'), document.getElementById('login-password')].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') accedi(); });
  });

  sb.auth.onAuthStateChange((evento, sessione) => {
    if (sessione) mostraApp(sessione);
    else mostraLogin();
  });

  sb.auth.getSession().then(({ data }) => {
    if (data.session) mostraApp(data.session);
    else mostraLogin();
  });
})();
</script>

</body>
</html>
